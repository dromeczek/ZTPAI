services:
  db:
    image: mariadb:11
    container_name: moja_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: sklep
      MARIADB_USER: appuser
      MARIADB_PASSWORD: app123
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: